services:
  postgres:
    image: postgres:16-alpine
    container_name: events-postgres
    environment:
      POSTGRES_USER: eventsuser
      POSTGRES_PASSWORD: eventspass
      POSTGRES_DB: eventsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventsuser -d eventsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  identity-server:
    build:
      context: .
      dockerfile: src/Identity/Identity.Server/Dockerfile
    container_name: events-identity
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: events-rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol port (services connect here)
      - "15672:15672"  # Management UI (browser)
    environment:
      RABBITMQ_DEFAULT_USER: eventsuser
      RABBITMQ_DEFAULT_PASS: eventspass
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  orders-api:
    build:
      context: .
      dockerfile: src/Orders/Orders.Api/Dockerfile
    container_name: events-orders-api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=eventsdb;Username=eventsuser;Password=eventspass
      - ASPNETCORE_ENVIRONMENT=Development
      - IdentityServer__Authority=http://identity-server:5001
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=eventsuser
      - RabbitMQ__Password=eventspass
      - Otlp__Endpoint=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/Gateway.Api/Dockerfile
    container_name: events-gateway
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - IdentityServer__Authority=http://identity-server:5001
      - ReverseProxy__Clusters__orders-cluster__Destinations__orders-api__Address=http://orders-api:8080
      - Otlp__Endpoint=http://jaeger:4317
    depends_on:
      - identity-server
      - orders-api

  notification-worker:
    build:
      context: .
      dockerfile: src/NotificationWorker/NotificationWorker/Dockerfile
    container_name: events-notification-worker
    environment:
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=eventsuser
      - RabbitMQ__Password=eventspass
      - Otlp__Endpoint=http://jaeger:4317
    depends_on:
      rabbitmq:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: events-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: events-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:10.4.2
    container_name: events-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  grafana-data: