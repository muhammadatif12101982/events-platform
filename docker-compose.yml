services:
  postgres:
    image: postgres:16-alpine
    container_name: events-postgres
    environment:
      POSTGRES_USER: eventsuser
      POSTGRES_PASSWORD: eventspass
      POSTGRES_DB: eventsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventsuser -d eventsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  identity-server:
    build:
      context: .
      dockerfile: src/Identity/Identity.Server/Dockerfile
    container_name: events-identity
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  orders-api:
    build:
      context: .
      dockerfile: src/Orders/Orders.Api/Dockerfile
    container_name: events-orders-api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=eventsdb;Username=eventsuser;Password=eventspass
      - ASPNETCORE_ENVIRONMENT=Development
      - IdentityServer__Authority=http://identity-server:5001
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/Gateway.Api/Dockerfile
    container_name: events-gateway
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - IdentityServer__Authority=http://identity-server:5001
      - ReverseProxy__Clusters__orders-cluster__Destinations__orders-api__Address=http://orders-api:8080
    depends_on:
      - identity-server
      - orders-api

volumes:
  postgres-data: